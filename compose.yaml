name: orchidarium
services:
  grafana:
    image: grafana/grafana:9.5.20
    container_name: grafana
    depends_on:
      influxdb:
        condition: service_started
      mysql:
        condition: service_healthy
    volumes:
      # Certs
      - type: bind
        source: ./certs/cert.pem
        target: /etc/grafana/cert.pem
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./certs/key.pem
        target: /etc/grafana/key.pem
        read_only: true
        bind:
          create_host_path: false
      # Config
      - type: bind
        source: ./config/grafana/config.ini
        target: /etc/grafana/grafana.ini
        read_only: true
        bind:
          create_host_path: false
    environment:
      - TERM=${TERM}
      - GF_INSTALL_PLUGINS=${GF_INSTALL_PLUGINS}
      - GF_PATHS_CONFIG=${GF_PATHS_CONFIG}
      - GF_PATHS_DATA=${GF_PATHS_DATA}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_USERS_ALLOW_SIGN_UP=${GF_USERS_ALLOW_SIGN_UP}
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=${GF_USERS_AUTO_ASSIGN_ORG_ROLE}
      - GF_USERS_AUTO_ASSIGN_ORG=${GF_USERS_AUTO_ASSIGN_ORG}
      - GF_USERS_AUTO_ASSIGN_ROLE=${GF_USERS_AUTO_ASSIGN_ROLE}
      - GF_USERS_DEFAULT_THEME=${GF_USERS_DEFAULT_THEME}
      - GF_USERS_VIEWERS_CAN_EDIT=${GF_USERS_VIEWERS_CAN_EDIT}
      - GF_USERS_VIEWERS_CAN_SAVE_DASHBOARDS=${GF_USERS_VIEWERS_CAN_SAVE_DASHBOARDS}
      - GF_USERS_VIEWERS_CAN_SAVE_TEMPORARY=${GF_USERS_VIEWERS_CAN_SAVE_TEMPORARY}
      - INFLUXDB_USERNAME=${INFLUXDB_USERNAME}
      - INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD}
      # Configure Grafana with the same user and password set below.
      - GF_DATABASE_USER=${GF_DATABASE_USER}
      - GF_DATABASE_PASSWORD=${GF_DATABASE_PASSWORD}
    ports:
      - '0.0.0.0:3000:3000'
    restart: unless-stopped
    healthcheck:
      test: >
        curl -skL https://localhost:3000/api/health
      interval: 3s
      retries: 10
      start_period: 5s
      timeout: 5s
    user: '0'
    deploy:
      resources:
        limits:
          cpus: '1.0'
        reservations:
          cpus: '0.25'
  influxdb:
    image: influxdb:2.7.6
    container_name: influxdb
    volumes:
      - influxdb-data:/data
    environment:
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN}
      #- DOCKER_INFLUXDB_INIT_RETENTION=1w
      - DOCKER_INFLUXDB_INIT_MODE=${DOCKER_INFLUXDB_INIT_MODE}
      - DOCKER_INFLUXDB_INIT_USERNAME=${DOCKER_INFLUXDB_INIT_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${DOCKER_INFLUXDB_INIT_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${DOCKER_INFLUXDB_INIT_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${DOCKER_INFLUXDB_INIT_BUCKET}
    ports:
      - '127.0.0.1:8086:8086'
    restart: unless-stopped
    healthcheck:
      test: influx ping || exit 1
      interval: 3s
      retries: 10
      start_period: 5s
      timeout: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
        reservations:
          cpus: '0.25'
  mysql:
    image: mysql:9.5
    container_name: mysql
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - '127.0.0.1:3306:3306'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
  orchidarium:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: production
      pull: true
    container_name: orchidarium
    depends_on:
      grafana:
        condition: service_started
      influxdb:
        condition: service_healthy
    # Provide access to the USB sensors.
    volumes:
      # udev on /dev/humidity type devtmpfs (ro,nosuid,relatime,size=32847200k,nr_inodes=8211800,mode=755,inode64)
      # udev on /dev/soil type devtmpfs (ro,nosuid,relatime,size=32847200k,nr_inodes=8211800,mode=755,inode64)
      # udev on /dev/bus/usb type devtmpfs (ro,nosuid,relatime,size=32847200k,nr_inodes=8211800,mode=755,inode64)
      - /dev/gpiomem:/dev/gpiomem:ro
      - /dev/bus/usb:/dev/bus/usb:ro
      # Wayland display socket from the host desktop session.
      - type: bind
        source: ${WAYLAND_RUNTIME_DIR}
        target: ${WAYLAND_CONTAINER_RUNTIME_DIR}
        bind:
          create_host_path: false
    environment:
      - DEBUG=${DEBUG}
      - DISPLAY=${DISPLAY}
      - HEALTHCHECK_PORT=${HEALTHCHECK_PORT}
      - HOME=${ORCHIDARIUM_HOME}
      - INFLUXDB_DATABASE=${INFLUXDB_DATABASE}
      - INFLUXDB_HOST=${INFLUXDB_HOST}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INTERVAL=${INTERVAL}
      - MAX_POINT_BACKLOG=${MAX_POINT_BACKLOG}
      - ORCHIDARIUM_RUNTIME_DIR=${ORCHIDARIUM_RUNTIME_DIR}
      - QT_QPA_PLATFORM=${QT_QPA_PLATFORM}
      - QT_QUICK_BACKEND=${QT_QUICK_BACKEND}
      - TMPDIR=${TMPDIR}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_CACHE_HOME=${XDG_CACHE_HOME}
      - XDG_CONFIG_HOME=${XDG_CONFIG_HOME}
      - XDG_RUNTIME_DIR=${ORCHIDARIUM_XDG_RUNTIME_DIR}
    ports:
      # Healthcheck is served on port 8085 on localhost.
      - '127.0.0.1:8085:8085'
    restart: unless-stopped
    healthcheck:
      test: >
        curl -fsL http://localhost:8085/health && curl -fsL http://localhost:8085/ready
      start_period: 5s
      interval: 30s
      timeout: 5s
      retries: 3
    user: '${ORCHIDARIUM_UID}:${ORCHIDARIUM_GID}'
    deploy:
      resources:
        limits:
          cpus: '1.0'
        reservations:
          cpus: '1.0'
    platform: linux/arm64
    privileged: true
    read_only: true
    tmpfs:
      # Runtime API snapshots shared between child processes.
      - /tmp/orchidarium:size=4m,uid=${ORCHIDARIUM_UID},gid=${ORCHIDARIUM_GID},mode=700
volumes:
  mysql-data:
    driver: local
    driver_opts:
      o: "size=500m,uid=0"
      device: tmpfs
      type: tmpfs
  influxdb-data:
    driver: local
    driver_opts:
      o: "size=10g,uid=0"
      device: tmpfs
      type: tmpfs
